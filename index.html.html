<!DOCTYPE html>
<html>
<head>
  <title>Entrega</title>
</head>
<body style="text-align:center;margin-top:50px;font-family:Arial;">

<h2>Clique para confirmar entrega</h2>

<button onclick="enviar()" style="font-size:20px;padding:15px;background:#0b57d0;color:white;border:none;border-radius:8px;">
📍 Enviar localização
</button>

<script>
function enviar() {
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude;
    var lon = pos.coords.longitude;

    window.location.href =
      "https://docs.google.com/forms/d/e/1FAIpQLScArIR3Hk_plgd4KoAh0psrockPJzPkJ1SlPeq4_6lIrRWrGQ/formResponse?entry.746366436=1814&entry.882904148=" 
      + lat + "," + lon;
  });
}
</script>

</body>
</html>
