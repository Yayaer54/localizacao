<!DOCTYPE html>
<html>
<head>
  <title>Confirmação de Entrega</title>
</head>
<body>

<h2>Selecione o status da entrega</h2>

<button onclick="enviar('Entregue')">✅ Entregue</button><br><br>
<button onclick="enviar('Não entregue')">❌ Não entregue</button><br><br>
<button onclick="enviar('Cliente ausente')">⏳ Cliente ausente</button>

<script>
function enviar(status) {

  var params = new URLSearchParams(window.location.search);
  var id = params.get("id");

  if (!navigator.geolocation) {
    alert("Geolocalização não suportada");
    return;
  }

  navigator.geolocation.getCurrentPosition(function(position) {

    var lat = position.coords.latitude;
    var lon = position.coords.longitude;

    var url = "https://docs.google.com/forms/d/e/1FAIpQLScArIR3Hk_plgd4KoAh0psrockPJzPkJ1SlPeq4_6lIrRWrGQ/formResponse?" +
      "entry.746366436=" + id +
      "&entry.882904148=" + lat + "," + lon +
      "&entry.1168111335=" + encodeURIComponent(status);

    window.location.href = url;

  }, function() {
    alert("Erro ao obter localização");
  });
}
</script>

</body>
</html>
