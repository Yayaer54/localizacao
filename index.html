<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Status da Entrega</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }

    button {
      display: block;
      width: 90%;
      max-width: 300px;
      margin: 10px auto;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .prep { background: #ffc107; color: black; }
    .rota { background: #007bff; }
    .entregue { background: #28a745; }
    .ausente { background: #dc3545; }
    .recusado { background: #6c757d; }
    .erro { background: #fd7e14; }

    #statusMsg {
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>Status da Entrega</h2>

<button class="prep" onclick="enviar('Em preparação')">🟡 Em preparação</button>
<button class="rota" onclick="enviar('Em rota')">🚚 Em rota</button>
<button class="entregue" onclick="enviar('Entregue')">✅ Entregue</button>
<button class="ausente" onclick="enviar('Cliente ausente')">🚫 Cliente ausente</button>
<button class="recusado" onclick="enviar('Recusado')">❌ Recusado</button>
<button class="erro" onclick="enviar('Endereço incorreto')">⚠️ Endereço incorreto</button>

<div id="statusMsg"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const msg = document.getElementById("statusMsg");

function enviar(status) {

  if (!id) {
    msg.innerHTML = "❌ ID não encontrado na URL";
    return;
  }

  msg.innerHTML = "📡 Capturando localização...";

  navigator.geolocation.getCurrentPosition(function(pos) {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const localizacao = lat + "," + lon;

    msg.innerHTML = "📡 Enviando dados...";

    const url = "https://docs.google.com/forms/d/e/1FAIpQLScArIR3Hk_plgd4KoAh0psrockPJzPkJ1SlPeq4_6lIrRWrGQ/formResponse" +
      "?entry.746366436=" + encodeURIComponent(id) +
      "&entry.882904148=" + encodeURIComponent(localizacao) +
      "&entry.1168111335=" + encodeURIComponent(status);

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    msg.innerHTML = "✅ Enviado com sucesso!";

  }, function() {
    msg.innerHTML = "❌ Permita a localização";
  });
}
</script>

</body>
</html>
