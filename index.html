<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Entrega</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      display: block;
      width: 90%;
      max-width: 300px;
      margin: 10px auto;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    .entregue { background: #28a745; }
    .ausente { background: #dc3545; }
    .erro { background: #ffc107; color: black; }

    #statusMsg {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h2>Status da Entrega</h2>

  <button class="entregue" onclick="enviar('Entregue')">✅ Entregue</button>
  <button class="ausente" onclick="enviar('Cliente ausente')">🚫 Cliente ausente</button>
  <button class="erro" onclick="enviar('Endereço incorreto')">⚠️ Endereço incorreto</button>

  <div id="statusMsg"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const msg = document.getElementById("statusMsg");

// valida ID
if (!id) {
  msg.innerHTML = "❌ ID da entrega não informado!";
}

// função principal
function enviar(status) {

  if (!id) return;

  // bloqueio de envio duplicado
  if (localStorage.getItem("enviado_" + id)) {
    msg.innerHTML = "⚠️ Esta entrega já foi registrada neste aparelho!";
    return;
  }

  msg.innerHTML = "📡 Capturando localização...";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const localizacao = lat + "," + lon;

    msg.innerHTML = "📡 Enviando dados...";

    const url = "https://docs.google.com/forms/d/e/1FAIpQLScArIR3Hk_plgd4KoAh0psrockPJzPkJ1SlPeq4_6lIrRWrGQ/formResponse" +
      "?entry.746366436=" + encodeURIComponent(id) +
      "&entry.882904148=" + encodeURIComponent(localizacao) +
      "&entry.1168111335=" + encodeURIComponent(status);

    fetch(url, { method: "POST", mode: "no-cors" })
      .then(() => {

        // salva bloqueio local
        localStorage.setItem("enviado_" + id, "true");

        msg.innerHTML = `
          <b>✅ Entrega registrada com sucesso!</b><br><br>
          🆔 <b>${id}</b><br>
          📍 ${localizacao}<br>
          📦 Status: ${status}
        `;
      });

  }, () => {
    msg.innerHTML = "❌ Não foi possível obter a localização. Ative o GPS.";
  });
}
</script>

</body>
</html>
