<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Status da Entrega</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    #remitoBox {
      font-size: 18px;
      margin-bottom: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 10px auto;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .prep { background: #ffc107; color: black; }
    .rota { background: #007bff; }
    .entregue { background: #28a745; }
    .ausente { background: #dc3545; }
    .recusado { background: #6c757d; }
    .erro { background: #fd7e14; }

    #statusMsg {
      margin-top: 20px;
      font-size: 16px;
      background: white;
      padding: 15px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h2>📦 Atualização de Entrega</h2>

<div id="remitoBox"></div>

<button class="prep" onclick="enviar('Em preparação')">🟡 Em preparação</button>
<button class="rota" onclick="enviar('Em rota')">🚚 Em rota</button>
<button class="entregue" onclick="enviar('Entregue')">✅ Entregue</button>
<button class="ausente" onclick="enviar('Cliente ausente')">🚫 Cliente ausente</button>
<button class="recusado" onclick="enviar('Recusado')">❌ Recusado</button>
<button class="erro" onclick="enviar('Endereço incorreto')">⚠️ Endereço incorreto</button>

<div id="statusMsg"></div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const msg = document.getElementById("statusMsg");
const remitoBox = document.getElementById("remitoBox");

// mostra o remito na tela
if (id) {
  remitoBox.innerHTML = "🆔 Remito: <b>" + id + "</b>";
} else {
  remitoBox.innerHTML = "❌ Remito não encontrado";
}

// evita clique duplicado
let enviado = false;

function bloquearBotoes() {
  document.querySelectorAll("button").forEach(btn => btn.disabled = true);
}

function enviar(status) {

  if (!id) {
    msg.innerHTML = "❌ ID não encontrado";
    return;
  }

  // bloqueio local (duplo clique)
  if (enviado) {
    msg.innerHTML = "⚠️ Já enviado, aguarde...";
    return;
  }

  // bloqueio se já foi entregue
  if (status === "Entregue" && localStorage.getItem("entregue_" + id)) {
    msg.innerHTML = "🚫 Esta entrega já foi finalizada anteriormente.";
    bloquearBotoes();
    return;
  }

  enviado = true;
  bloquearBotoes();

  msg.innerHTML = "📡 Capturando localização...";

  navigator.geolocation.getCurrentPosition(function(pos) {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const localizacao = lat + "," + lon;

    msg.innerHTML = "📡 Enviando dados...";

    const url = "https://docs.google.com/forms/d/e/1FAIpQLScArIR3Hk_plgd4KoAh0psrockPJzPkJ1SlPeq4_6lIrRWrGQ/formResponse" +
      "?entry.746366436=" + encodeURIComponent(id) +
      "&entry.882904148=" + encodeURIComponent(localizacao) +
      "&entry.1168111335=" + encodeURIComponent(status);

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    // salva como entregue
    if (status === "Entregue") {
      localStorage.setItem("entregue_" + id, "true");
    }

    msg.innerHTML = `
      <b>✅ Registro realizado com sucesso!</b><br><br>
      🆔 <b>${id}</b><br>
      📍 ${localizacao}<br>
      📦 Status: ${status}
    `;

  }, function() {
    msg.innerHTML = "❌ Permita a localização";
    enviado = false;
  });
}
</script>

</body>
</html>
